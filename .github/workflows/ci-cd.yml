name: CI/CD Pipeline to GCP

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # GCP Project ID
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }} # e.g. us-central1, asia-southeast1
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }} # repository name (e.g. bookstore)
  FRONTEND_IMAGE: bookstore-frontend
  BACKEND_IMAGE: bookstore-backend

jobs:
  lint-and-test:
    name: Lint, Test, & Audit Applications
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Dependency Caching: Specifically caches pnpm global store directory
          cache: 'pnpm'
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            backend/pnpm-lock.yaml

      # --- Frontend ---
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Run Frontend Security Audit
        working-directory: frontend
        run: pnpm audit --audit-level=high

      - name: Lint Frontend
        working-directory: frontend
        run: pnpm run lint

      - name: Run Frontend Tests
        working-directory: frontend
        run: pnpm run test

      - name: Compile/Build Frontend (Typecheck Check)
        working-directory: frontend
        run: pnpm run build

      # --- Backend ---
      - name: Install Backend Dependencies
        working-directory: backend
        run: pnpm install --no-frozen-lockfile

      - name: Run Backend Security Audit
        working-directory: backend
        run: pnpm audit --audit-level=high

      - name: Lint Backend
        working-directory: backend
        run: pnpm run lint

      - name: Run Backend Tests
        working-directory: backend
        run: pnpm run test

  build-and-push:
    name: Build & Push Docker Images to GAR
    # Pipeline Blocker: Deployment depends on the success of the 'lint-and-test' job.
    # If linting, security audit, or unit tests fail, this job is blocked and deployment is cancelled.
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Variables based on Branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=bookstore-backend" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=bookstore-frontend" >> $GITHUB_ENV
            echo "DB_SECRET=DB_URL:latest" >> $GITHUB_ENV
            echo "JWT_SECRET=JWT_SECRET_KEY:latest" >> $GITHUB_ENV
            echo "VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=bookstore-backend-staging" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=bookstore-frontend-staging" >> $GITHUB_ENV
            echo "DB_SECRET=DB_URL_STAGING:latest" >> $GITHUB_ENV
            echo "JWT_SECRET=JWT_SECRET_KEY_STAGING:latest" >> $GITHUB_ENV
            if [ -n "${{ secrets.VITE_BACKEND_URL_STAGING }}" ]; then
              echo "VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL_STAGING }}" >> $GITHUB_ENV
            else
              echo "VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}" >> $GITHUB_ENV
            fi
          fi

      # --- Google Cloud Auth ---
      # Option 1: Workload Identity Federation (RECOMMENDED)
      # Uncomment the step below and configure secrets if using WIF.
      # - name: Authenticate to Google Cloud (Workload Identity)
      #   id: auth-wif
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Option 2: Service Account Key (LEGACY FALLBACK)
      # Uses the JSON key stored in secrets.GCP_SA_KEY
      - name: Authenticate to Google Cloud (Service Account Key)
        id: auth-sa
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up GCloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to GCP Artifact Registry
      - name: Docker Auth to GAR
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Set up Docker Buildx for optimization
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build & Push Frontend ---
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_KEY=${{ secrets.VITE_API_KEY_STAGING || secrets.VITE_API_KEY }}
            VITE_Auth_Domain=${{ secrets.VITE_Auth_Domain_STAGING || secrets.VITE_Auth_Domain }}
            VITE_PROJECT_ID=${{ secrets.VITE_PROJECT_ID_STAGING || secrets.VITE_PROJECT_ID }}
            VITE_STORAGE_BUCKET=${{ secrets.VITE_STORAGE_BUCKET_STAGING || secrets.VITE_STORAGE_BUCKET }}
            VITE_MESSAGING_SENDERID=${{ secrets.VITE_MESSAGING_SENDERID_STAGING || secrets.VITE_MESSAGING_SENDERID }}
            VITE_APPID=${{ secrets.VITE_APPID_STAGING || secrets.VITE_APPID }}
            VITE_BACKEND_URL=${{ env.VITE_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & Push Backend ---
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deploy Backend to Cloud Run ---
      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ secrets.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=5000'
          secrets: |
            DB_URL=${{ env.DB_SECRET }}
            JWT_SECRET_KEY=${{ env.JWT_SECRET }}

      # --- Deploy Frontend to Cloud Run ---
      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ secrets.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=80'
