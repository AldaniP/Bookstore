name: CI/CD Pipeline to GCP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # GCP Project ID
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }} # e.g. us-central1, asia-southeast1
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }} # repository name (e.g. bookstore)
  FRONTEND_IMAGE: bookstore-frontend
  BACKEND_IMAGE: bookstore-backend

jobs:
  lint-and-test:
    name: Lint, Test, & Audit Applications
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Dependency Caching: Specifically caches pnpm global store directory
          cache: 'pnpm'
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            backend/pnpm-lock.yaml

      # --- Frontend ---
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Run Frontend Security Audit
        working-directory: frontend
        run: pnpm audit --audit-level=high

      - name: Lint Frontend
        working-directory: frontend
        run: pnpm run lint

      - name: Run Frontend Tests
        working-directory: frontend
        run: pnpm run test

      - name: Compile/Build Frontend (Typecheck Check)
        working-directory: frontend
        run: pnpm run build

      - name: Get Playwright Version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (with dependencies)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright System Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: pnpm exec playwright install-deps

      - name: Run Frontend E2E Smoke Tests
        working-directory: frontend
        run: pnpm run test:e2e:ci

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      # --- Backend ---
      - name: Install Backend Dependencies
        working-directory: backend
        run: pnpm install --no-frozen-lockfile

      - name: Run Backend Security Audit
        working-directory: backend
        run: pnpm audit --audit-level=high

      - name: Lint Backend
        working-directory: backend
        run: pnpm run lint

      - name: Run Backend Tests
        working-directory: backend
        run: pnpm run test

  build-and-push:
    name: Build & Push Docker Images to GAR
    # Pipeline Blocker: Deployment depends on the success of the 'lint-and-test' job.
    # If linting, security audit, or unit tests fail, this job is blocked and deployment is cancelled.
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Google Cloud Auth ---
      # Option 1: Workload Identity Federation (RECOMMENDED)
      # Uncomment the step below and configure secrets if using WIF.
      # - name: Authenticate to Google Cloud (Workload Identity)
      #   id: auth-wif
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Option 2: Service Account Key (LEGACY FALLBACK)
      # Uses the JSON key stored in secrets.GCP_SA_KEY
      - name: Authenticate to Google Cloud (Service Account Key)
        id: auth-sa
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up GCloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to GCP Artifact Registry
      - name: Docker Auth to GAR
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Set up Docker Buildx for optimization
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build & Push Frontend ---
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_KEY=${{ secrets.VITE_API_KEY }}
            VITE_Auth_Domain=${{ secrets.VITE_Auth_Domain }}
            VITE_PROJECT_ID=${{ secrets.VITE_PROJECT_ID }}
            VITE_STORAGE_BUCKET=${{ secrets.VITE_STORAGE_BUCKET }}
            VITE_MESSAGING_SENDERID=${{ secrets.VITE_MESSAGING_SENDERID }}
            VITE_APPID=${{ secrets.VITE_APPID }}
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & Push Backend ---
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deploy Backend to Cloud Run ---
      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: bookstore-backend
          region: ${{ secrets.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=5000'
          secrets: |
            DB_URL=DB_URL:latest
            JWT_SECRET_KEY=JWT_SECRET_KEY:latest

      # --- Deploy Frontend to Cloud Run ---
      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: bookstore-frontend
          region: ${{ secrets.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=80'
